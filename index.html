<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Campaign Submission Portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React 18 + ReactDOM + Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --primary: #0066FF;
            --primary-hover: #0052cc;
            --primary-light: #e8f0fe;
            --bg: #f4f6f9;
            --card: #ffffff;
            --border: #e0e0e0;
            --error: #e53935;
            --success: #2e7d32;
            --warning: #f57c00;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --section-bg: #f9f9f9;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Page Layout */
        .page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .form-card {
            max-width: 700px;
            width: 100%;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.08);
            padding: 40px;
        }
        
        @media (max-width: 600px) {
            .form-card {
                padding: 24px 16px;
                border-radius: 0;
                min-height: 100vh;
            }
            
            .page-container {
                padding: 0;
            }
        }
        
        /* Progress Bar */
        .progress-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }
        
        .progress-step {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .step-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .step-circle.pending {
            background: #e0e0e0;
            color: var(--text-secondary);
        }
        
        .step-circle.active {
            background: var(--primary);
            color: white;
        }
        
        .step-circle.completed {
            background: var(--primary);
            color: white;
        }
        
        .step-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        
        .step-label.active {
            color: var(--primary);
            font-weight: 600;
        }
        
        .step-label.completed {
            color: var(--text);
        }
        
        .step-connector {
            flex: 1;
            height: 2px;
            background: var(--border);
            margin: 0 8px;
            min-width: 20px;
            transition: all 0.2s ease;
        }
        
        .step-connector.completed {
            background: var(--primary);
        }
        
        @media (max-width: 600px) {
            .step-label {
                display: none;
            }
            
            .progress-step {
                justify-content: center;
            }
        }
        
        /* Typography */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subheading {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text);
        }
        
        .required::after {
            content: " *";
            color: var(--error);
        }
        
        input, select, textarea {
            width: 100%;
            height: 44px;
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
        }
        
        textarea {
            height: auto;
            min-height: 100px;
            padding: 12px;
            resize: vertical;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.12);
            outline: none;
        }
        
        .error input, .error select, .error textarea {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .error-message {
            font-size: 12px;
            color: var(--error);
            margin-top: 4px;
        }
        
        .input-prefix-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        
        .input-prefix-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.12);
        }
        
        .input-prefix-wrapper.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(229,57,53,0.1);
        }
        
        .input-prefix {
            padding: 0 12px;
            color: var(--text-secondary);
            font-size: 14px;
            background: var(--section-bg);
            height: 42px;
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
        }
        
        .input-prefix-wrapper input {
            border: none;
            box-shadow: none;
            border-radius: 0;
        }
        
        .input-prefix-wrapper input:focus {
            box-shadow: none;
        }
        
        /* Grid Layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
            justify-content: flex-end;
        }
        
        .btn {
            height: 44px;
            border-radius: 8px;
            font-weight: 600;
            padding: 0 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 14px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        
        .btn-secondary:hover {
            background: var(--section-bg);
        }
        
        .btn-full {
            width: 100%;
            height: 48px;
            font-size: 15px;
        }
        
        /* Section Cards */
        .section-card {
            background: var(--section-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        
        .section-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .section-instruction {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        
        .add-link {
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 12px;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .add-link:hover {
            text-decoration: underline;
        }
        
        .remove-link {
            color: var(--error);
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .field-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .field-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        /* Character Counter */
        .char-counter {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
            text-align: right;
        }
        
        .char-counter.warning {
            color: var(--warning);
        }
        
        .char-counter.error {
            color: var(--error);
        }
        
        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: var(--section-bg);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }
        
        .upload-icon {
            margin-bottom: 12px;
        }
        
        .upload-text {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .upload-subtext {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* File Cards */
        .file-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 12px;
        }
        
        .file-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .file-thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--section-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .file-thumbnail.video {
            background: #333;
        }
        
        .file-info {
            flex: 1;
            min-width: 0;
        }
        
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .file-size {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .btn-remove {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--error);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .btn-remove:hover {
            opacity: 0.9;
        }
        
        .file-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 600px) {
            .file-fields {
                grid-template-columns: 1fr;
            }
        }
        
        /* Format Info */
        .format-info {
            background: var(--primary-light);
            border-left: 3px solid var(--primary);
            border-radius: 4px;
            padding: 10px 12px;
            font-size: 12px;
            margin-top: 8px;
            color: var(--text);
        }
        
        /* Review Section */
        .review-section {
            position: relative;
        }
        
        .review-edit {
            position: absolute;
            top: 0;
            right: 0;
            color: var(--primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
        }
        
        .review-edit:hover {
            text-decoration: underline;
        }
        
        .review-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .review-row:last-child {
            border-bottom: none;
        }
        
        .review-label {
            font-weight: 600;
            width: 160px;
            flex-shrink: 0;
            font-size: 13px;
        }
        
        .review-value {
            flex: 1;
            font-size: 13px;
            word-break: break-word;
        }
        
        .copy-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .copy-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        
        .copy-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .copy-text {
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .copy-count {
            font-size: 11px;
            color: var(--text-secondary);
            background: var(--section-bg);
            padding: 2px 6px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .asset-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .asset-row:last-child {
            border-bottom: none;
        }
        
        .asset-thumb {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--section-bg);
            flex-shrink: 0;
        }
        
        .asset-details {
            flex: 1;
            min-width: 0;
        }
        
        .asset-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .asset-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 24px 0;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--primary);
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: 400;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Error Banner */
        .error-banner {
            background: #fdecea;
            border-left: 4px solid var(--error);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .error-banner-text {
            color: var(--error);
            font-size: 14px;
        }
        
        .btn-dismiss {
            background: none;
            border: none;
            color: var(--error);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        
        .overlay-text {
            font-size: 16px;
            color: var(--text-secondary);
        }
        
        /* Success Screen */
        .success-screen {
            text-align: center;
            padding: 40px;
        }
        
        .success-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
        }
        
        .success-heading {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .success-text {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        /* Centered States */
        .centered-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        
        .logo-placeholder {
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 24px;
        }
        
        .invalid-heading {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .invalid-text {
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 400px;
        }
        
        /* Toast */
        .toast {
            background: var(--error);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // SVG Icons
        const CheckmarkIcon = () => (

        const CloudUploadIcon = () => (

                <path d="M24 26V38M24 26L20 30M24 26L28 30" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>

        const VideoIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{color: 'white'}}>
                <rect x="2" y="6" width="20" height="12" rx="2" stroke="currentColor" strokeWidth="2"/>

        // Format specifications
        const FORMAT_SPECS = {

            'Feed 4:5': '1080×1350px · JPG/PNG/MP4 · Max 30MB · Keep key content within centre 80% of frame',

        const PLATFORM_FORMATS = {

            ],

        };
        
        const CTA_OPTIONS = [
            'Learn More',
            'Get Tickets Now',
            'Sign Up',
            'Shop Now',
            'Contact Us',
            'Download',
            'Book Now'
        ];
        
        const PLATFORM_OPTIONS = ['Meta', 'TikTok', 'StackAdapt'];
        
        // Character limits
        const LIMITS = {
            primary_text: 125,
            headline: 25,
            link_description: 30,
            ad_text: 100,
            display_name: 25,
            sa_headline: 90,
            sa_body: 150
        };
        
        function App() {
            // Token and auth state
            const [token, setToken] = useState('');
            const [clientName, setClientName] = useState('');
            const [amEmail, setAmEmail] = useState('');
            const [authState, setAuthState] = useState('loading');
            
            // Form state
            const [currentStep, setCurrentStep] = useState(1);
            const [errors, setErrors] = useState({});
            const [submitting, setSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [submitError, setSubmitError] = useState(null);
            const [uploadError, setUploadError] = useState(null);
            
            // Form data
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                campaignName: '',
                platform: '',
                startDate: '',
                endDate: '',
                budget: '',
                destinationUrl: '',
                cta: '',
                copy: {
                    primary_text_1: '',

                    primary_text_3: '',
